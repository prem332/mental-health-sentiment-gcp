name: CI/CD → GCP Cloud Run

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: 🧪 Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.10", cache: pip }
      - run: pip install -r requirements.txt pytest
      - run: pytest tests/ -v --tb=short
        env: { MODEL_DIR: tests/mock_models }

  build-push:
    name: 🐳 Build & Push Image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: "${{ secrets.GCP_SA_KEY }}"

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Build and push
        run: |
          IMAGE="us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/mental-health-sentiment-repo/mental-health-sentiment"
          SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "Building image: ${IMAGE}:${SHA}"
          docker build -t "${IMAGE}:${SHA}" -t "${IMAGE}:latest" .
          docker push "${IMAGE}:${SHA}"
          docker push "${IMAGE}:latest"
          echo "✅ Image pushed: ${IMAGE}:latest"

  deploy:
    name: 🚀 Deploy to Cloud Run
    runs-on: ubuntu-latest
    needs: build-push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: "${{ secrets.GCP_SA_KEY }}"

      - uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        run: |
          IMAGE="us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/mental-health-sentiment-repo/mental-health-sentiment:latest"
          echo "Deploying image: ${IMAGE}"
          gcloud run deploy mental-health-sentiment \
            --image "${IMAGE}" \
            --region us-central1 \
            --platform managed \
            --allow-unauthenticated \
            --memory 2Gi \
            --cpu 2 \
            --min-instances 0 \
            --max-instances 3 \
            --timeout 120 \
            --set-env-vars "GCS_BUCKET=${{ secrets.GCS_BUCKET }},MODEL_DIR=/app/models,MAX_LEN=100" \
            --service-account "${{ secrets.CLOUD_RUN_SA_EMAIL }}"

      - name: Smoke test
        run: |
          URL=$(gcloud run services describe mental-health-sentiment \
            --region us-central1 \
            --format 'value(status.url)')
          echo "✅ Service URL: ${URL}"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${URL}/health")
          echo "Health check status: ${STATUS}"
          [ "$STATUS" = "200" ] && echo "✅ Healthy!" || echo "⚠️ Status: ${STATUS}"
