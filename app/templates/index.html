<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mental Health Sentiment Analyzer</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🧠</text></svg>">
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}"/>
</head>
<body>
  <div class="container">
    <h1>🧠 Mental Health Sentiment Analyzer</h1>
    <div class="card">
      <textarea id="inputText" placeholder="Enter a tweet or text about mental health..." rows="5"></textarea>
      <button id="analyzeBtn" onclick="analyze()">Analyze Sentiment</button>
    </div>
    <div id="result" class="result hidden"></div>
    <div id="loader" class="loader hidden">Analyzing…</div>
  </div>
  <script>
    const colorMap = {
      Positive:   { bg: "#2ecc71", light: "#eafaf1" },
      Negative:   { bg: "#e74c3c", light: "#fdf2f2" },
      Neutral:    { bg: "#3498db", light: "#ebf5fb" },
      Irrelevant: { bg: "#95a5a6", light: "#f4f6f7" }
    };

    async function analyze() {
      const text = document.getElementById("inputText").value.trim();
      if (!text) { alert("Please enter some text."); return; }

      document.getElementById("loader").classList.remove("hidden");
      document.getElementById("result").classList.add("hidden");
      document.getElementById("analyzeBtn").disabled = true;

      try {
        const res  = await fetch("/predict", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ text })
        });
        const data = await res.json();
        if (data.error) throw new Error(data.error);

        const sentiment  = data.sentiment;
        const confidence = (data.confidence * 100).toFixed(2);
        const colors     = colorMap[sentiment] || { bg: "#333", light: "#f9f9f9" };

        document.getElementById("result").innerHTML = `
          <div class="sentiment-badge" style="background:${colors.light};border-left:5px solid ${colors.bg}">
            <div class="sentiment-label" style="color:${colors.bg}">${sentiment}</div>
            <div class="confidence-text">Confidence: <strong>${confidence}%</strong></div>
            <div class="confidence-bar-wrap">
              <div class="confidence-bar" style="width:${confidence}%;background:${colors.bg}"></div>
            </div>
          </div>`;
        document.getElementById("result").classList.remove("hidden");

      } catch(e) {
        document.getElementById("result").innerHTML = `<p class="error">Error: ${e.message}</p>`;
        document.getElementById("result").classList.remove("hidden");
      } finally {
        document.getElementById("loader").classList.add("hidden");
        document.getElementById("analyzeBtn").disabled = false;
      }
    }

    document.getElementById("inputText").addEventListener("keydown", e => {
      if (e.ctrlKey && e.key === "Enter") analyze();
    });
  </script>
</body>
</html>
